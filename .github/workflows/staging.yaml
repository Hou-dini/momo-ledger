name: Deploy to Staging

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'data_ingestion/**'
      - 'tests/**'
      - 'deployment/**'
      - 'uv.lock'

jobs:
  deploy_and_test_staging:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: 'projects/70624156468/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'momo-ledger-deployer@vibe-coding-intensive-course.iam.gserviceaccount.com'
          create_credentials_file: true
          project_id: 'vibe-coding-intensive-course'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          install_components: 'beta'

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t us-east1-docker.pkg.dev/vibe-coding-intensive-course/momo-ledger-repo/momo-ledger:${{ github.sha }} \
            --build-arg COMMIT_SHA=${{ github.sha }} \
            .
          docker push us-east1-docker.pkg.dev/vibe-coding-intensive-course/momo-ledger-repo/momo-ledger:${{ github.sha }}

      - name: Deploy to Staging (Cloud Run)
        run: |
          uvx google-agents-cli deploy \
            --project vibe-coding-intensive-course \
            --region us-east1 \
            --image us-east1-docker.pkg.dev/vibe-coding-intensive-course/momo-ledger-repo/momo-ledger:${{ github.sha }}

      - name: Make Staging Service Public
        run: |
          gcloud run services add-iam-policy-binding momo-ledger \
            --region us-east1 \
            --project vibe-coding-intensive-course \
            --member "allUsers" \
            --role "roles/run.invoker" \
            --quiet

      - name: Fetch Staging Service URL
        id: fetch-url
        run: |
          _STAGING_URL=$(gcloud run services describe momo-ledger \
            --region us-east1 --project vibe-coding-intensive-course --format="value(status.url)")
          echo "_staging_url=${_STAGING_URL}" >> $GITHUB_OUTPUT

      - name: Fetch ID Token
        id: fetch-token
        uses: 'google-github-actions/auth@v3'
        with:
          create_credentials_file: false
          workload_identity_provider: 'projects/70624156468/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'momo-ledger-deployer@vibe-coding-intensive-course.iam.gserviceaccount.com'
          id_token_audience: ${{ steps.fetch-url.outputs._staging_url }}
          id_token_include_email: true

      - name: Run load test
        run: |
          export _ID_TOKEN="${{ steps.fetch-token.outputs.id_token }}"
          export _STAGING_URL="${{ steps.fetch-url.outputs._staging_url }}"
          uvx locust==2.31.1 \
          -f tests/load_test/load_test.py \
          --headless \
          -H ${_STAGING_URL} \
          -t 30s -u 10 -r 0.5 \
          --csv=tests/load_test/.results/results \
          --html=tests/load_test/.results/report.html

      - name: Export Load Test Results to GCS
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          gcloud storage cp --recursive tests/load_test/.results gs://vibe-coding-intensive-course-staging-logs/load-test-results/results-${TIMESTAMP} --quiet
          echo "_________________________________________________________________________"
          echo "Load test results copied to gs://vibe-coding-intensive-course-staging-logs/load-test-results/results-${TIMESTAMP}"
          echo "HTTP link: https://console.cloud.google.com/storage/browser/vibe-coding-intensive-course-staging-logs/load-test-results/results-${TIMESTAMP}"
          echo "_________________________________________________________________________"

  call_production_workflow:
    needs: deploy_and_test_staging
    uses: ./.github/workflows/deploy-to-prod.yaml
    permissions:
      contents: 'read'
      id-token: 'write'
    secrets: inherit